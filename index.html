<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MLG WebAR Navigation - Mahakam Lampion Garden</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        /* CSS SAMA SEPERTI SEBELUMNYA */
        :root { --primary: #ff7675; --secondary: #0984e3; --dark: #2d3436; --light: #f5f6fa; --glass: rgba(255, 255, 255, 0.85); --glass-dark: rgba(45, 52, 54, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }

        /* PERUBAHAN PADA SPLASH SCREEN UNTUK iOS */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            text-align: center; padding: 20px; transition: opacity 0.5s ease;
        }
        
        .btn-start-ar {
            background: var(--primary); color: white; border: none;
            padding: 15px 30px; border-radius: 25px; font-size: 16px;
            font-weight: bold; margin-top: 20px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 118, 117, 0.4);
        }

        /* HUD & UI LAINNYA TETAP SAMA */
        .top-hud { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 92%; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .search-container { display: flex; background: var(--glass); backdrop-filter: blur(10px); border-radius: 25px; padding: 5px 15px; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .search-container input { flex: 1; border: none; background: transparent; padding: 10px; font-size: 15px; outline: none; color: var(--dark); }
        .filter-tags { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tag { background: var(--glass-dark); color: white; padding: 6px 16px; border-radius: 15px; font-size: 13px; white-space: nowrap; cursor: pointer; border: 1px solid transparent; }
        .tag.active { background: var(--primary); border-color: var(--primary); font-weight: bold; }
        .bottom-hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; z-index: 100; display: flex; flex-direction: column; gap: 15px; }
        #compass-guide { width: 60px; height: 60px; background: var(--glass-dark); border-radius: 50%; margin: 0 auto; display: none; justify-content: center; align-items: center; border: 2px solid var(--primary); }
        #compass-guide i { color: var(--primary); font-size: 24px; }
        .tenant-card { background: var(--glass); backdrop-filter: blur(12px); border-radius: 20px; padding: 18px; display: none; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card-title { font-size: 18px; color: var(--dark); font-weight: bold; }
        .card-distance { background: var(--secondary); color: white; padding: 4px 10px; border-radius: 10px; font-size: 12px; }
        .card-body p { font-size: 14px; color: #555; margin-bottom: 6px; }
        .btn-action { width: 100%; background: var(--dark); color: white; border: none; padding: 12px; border-radius: 12px; margin-top: 10px; cursor: pointer; }
        #geo-alert { position: fixed; top: 20px; left: 5%; width: 90%; background: #e74c3c; color: white; padding: 15px; border-radius: 10px; text-align: center; z-index: 10000; display: none; }
    </style>
</head>
<body>

    <div id="geo-alert"><i class="fas fa-exclamation-triangle"></i> <span id="alert-text"></span></div>

    <div id="splash-screen">
        <h2>Mahakam Lampion Garden</h2>
        <p style="color: #bdc3c7; font-size: 14px; margin-top: 10px; margin-bottom: 20px;">Sistem Navigasi AR Berbasis Lokasi</p>
        <button class="btn-start-ar" id="btn-request-permission">
            <i class="fas fa-camera"></i> Mulai Navigasi
        </button>
    </div>

    <div class="top-hud">
        <div class="search-container"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="Cari kuliner..."></div>
        <div class="filter-tags">
            <div class="tag active" data-category="semua">Semua</div>
            <div class="tag" data-category="Makanan Berat">Makanan Berat</div>
            <div class="tag" data-category="Minuman & Kopi">Minuman</div>
        </div>
    </div>

    <div class="bottom-hud">
        <div id="compass-guide"><i class="fas fa-long-arrow-alt-up"></i></div>
        <div class="tenant-card" id="detail-card">
            <div class="card-header">
                <div class="card-title" id="card-nama">Nama</div>
                <div class="card-distance" id="card-jarak">-- m</div>
            </div>
            <div class="card-body">
                <button class="btn-action" id="btn-navigasi">Tutup Info</button>
            </div>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const DATA_TENANT = [
            { id: 1, nama: "Coffee Shop Tepian", category: "Minuman & Kopi", lat: -0.505234, lng: 117.153456 },
            { id: 2, nama: "Soto Banjar Nyaman", category: "Makanan Berat", lat: -0.505450, lng: 117.153680 }
        ];

        let userLocation = { lat: null, lng: null };
        const splashScreen = document.getElementById('splash-screen');
        const alertBox = document.getElementById('geo-alert');

        window.onload = () => {
            // Kita menunggu user menekan tombol, tidak langsung memuat sensor
            document.getElementById('btn-request-permission').addEventListener('click', requestiOSPermissions);
        };

        // FUNGSI KHUSUS UNTUK MEMINTA IZIN SENSOR DI iOS
        function requestiOSPermissions() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // Device iOS 13+
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            mulaiSistem();
                        } else {
                            tampilkanError("Izin sensor ditolak. Kompas AR tidak akan berfungsi.");
                            mulaiSistem(); // Tetap lanjut walau tanpa kompas
                        }
                    })
                    .catch(console.error);
            } else {
                // Bukan iOS atau versi iOS lama
                mulaiSistem();
            }
        }

        function mulaiSistem() {
            splashScreen.style.opacity = 0;
            setTimeout(() => splashScreen.style.display = 'none', 500);
            
            initGeolokan();
            renderARObjects();
        }

        function initGeolokan() {
            if (!navigator.geolocation) {
                tampilkanError("Browser tidak mendukung GPS."); return;
            }
            navigator.geolocation.watchPosition(
                (position) => {
                    userLocation.lat = position.coords.latitude;
                    userLocation.lng = position.coords.longitude;
                },
                (error) => tampilkanError("Gagal akses GPS. Pastikan lokasi aktif."),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function renderARObjects() {
            const scene = document.querySelector('a-scene');
            DATA_TENANT.forEach(tenant => {
                const entity = document.createElement('a-entity');
                entity.setAttribute('gps-entity-place', `latitude: ${tenant.lat}; longitude: ${tenant.lng};`);
                
                const box = document.createElement('a-box');
                box.setAttribute('color', '#ff7675');
                box.setAttribute('scale', '2 2 2');
                box.setAttribute('position', '0 2 0');
                
                entity.appendChild(box);
                scene.appendChild(entity);
            });
        }

        function tampilkanError(pesan) {
            document.getElementById('alert-text').innerText = pesan;
            alertBox.style.display = 'block';
            setTimeout(() => alertBox.style.display = 'none', 5000);
        }
    </script>
</body>
</html>
