<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MLG WebAR Navigation - Mahakam Lampion Garden</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        :root {
            --primary: #ff7675;
            --secondary: #0984e3;
            --dark: #2d3436;
            --light: #f5f6fa;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-dark: rgba(45, 52, 54, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Layar Loading/Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* HUD - Top Bar (Pencarian & Filter) */
        .top-hud {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 92%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-container {
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 5px 15px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-container input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 15px;
            outline: none;
            color: var(--dark);
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .filter-tags::-webkit-scrollbar { display: none; }

        .tag {
            background: var(--glass-dark);
            color: white;
            padding: 6px 16px;
            border-radius: 15px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .tag.active {
            background: var(--primary);
            border-color: var(--primary);
            font-weight: bold;
        }

        /* HUD - Bottom Navigation & Cards */
        .bottom-hud {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 92%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Kompas Navigasi Minimalis (Radar Petunjuk Arah) */
        #compass-guide {
            width: 60px; height: 60px;
            background: var(--glass-dark);
            border-radius: 50%;
            margin: 0 auto;
            display: none;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        #compass-guide i {
            color: var(--primary);
            font-size: 24px;
        }

        /* Card Informasi Tenant Aktif */
        .tenant-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .card-title { font-size: 18px; color: var(--dark); font-weight: bold; }
        .card-distance { 
            background: var(--secondary); color: white; 
            padding: 4px 10px; border-radius: 10px; 
            font-size: 12px; font-weight: bold;
        }
        .card-body p {
            font-size: 14px; color: #555; margin-bottom: 6px;
            display: flex; align-items: center; gap: 8px;
        }
        .card-body i { color: var(--secondary); width: 16px; }

        .btn-action {
            width: 100%;
            background: var(--dark);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-action.navigating { background: #2ecc71; }

        /* Floating Action Button untuk Toggle List View */
        #btn-toggle-list {
            position: absolute;
            right: 4%; bottom: 25px;
            width: 55px; height: 55px;
            background: var(--primary);
            color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 105; cursor: pointer;
        }

        /* Panel List Tenant (Drawer) */
        #list-drawer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--light);
            z-index: 500;
            padding: 80px 20px 20px 20px;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }
        #list-drawer.open { transform: translateY(0); }

        .drawer-close {
            position: absolute; top: 20px; right: 20px;
            font-size: 24px; color: var(--dark); cursor: pointer;
        }

        .list-item {
            background: white;
            padding: 15px; border-radius: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .list-info h4 { color: var(--dark); margin-bottom: 4px; }
        .list-info p { font-size: 13px; color: #7f8c8d; }
        .list-action { color: var(--primary); font-size: 18px; }

        /* Alert Box */
        #geo-alert {
            position: fixed; top: 20px; left: 5%; width: 90%;
            background: #e74c3c; color: white; padding: 15px;
            border-radius: 10px; text-align: center; z-index: 10000;
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="geo-alert">
        <i class="fas fa-exclamation-triangle"></i> <span id="alert-text">Akses GPS Diperlukan!</span>
    </div>

    <div id="splash-screen">
        <div class="spinner"></div>
        <h2>Mahakam Lampion Garden</h2>
        <p style="color: #bdc3c7; font-size: 14px; margin-top: 5px;">Memuat Kamera AR & Sensor Geolokasi...</p>
    </div>

    <div class="top-hud">
        <div class="search-container">
            <i class="fas fa-search" style="color: #7f8c8d;"></i>
            <input type="text" id="search-input" placeholder="Cari kuliner, kopi, stan...">
        </div>
        <div class="filter-tags">
            <div class="tag active" data-category="semua">Semua</div>
            <div class="tag" data-category="Makanan Berat">Makanan Berat</div>
            <div class="tag" data-category="Makanan Ringan">Camilan</div>
            <div class="tag" data-category="Minuman & Kopi">Kopi & Minuman</div>
        </div>
    </div>

    <div id="btn-toggle-list">
        <i class="fas fa-list"></i>
    </div>

    <div id="list-drawer">
        <i class="fas fa-times drawer-close" id="btn-close-drawer"></i>
        <h3 style="margin-bottom: 20px; color: var(--dark);">Daftar Tenant Kuliner</h3>
        <div id="tenant-list-container">
            </div>
    </div>

    <div class="bottom-hud">
        <div id="compass-guide">
            <i class="fas fa-long-arrow-alt-up"></i>
        </div>

        <div class="tenant-card" id="detail-card">
            <div class="card-header">
                <div class="card-title" id="card-nama">Nama Tenant</div>
                <div class="card-distance" id="card-jarak">-- m</div>
            </div>
            <div class="card-body">
                <p><i class="fas fa-utensils"></i> <span id="card-menu">Menu Andalan</span></p>
                <p><i class="fas fa-clock"></i> <span id="card-jam">Jam Ops</span></p>
                <p><i class="fas fa-tags"></i> <span id="card-harga">Kisaran Harga</span></p>
                <button class="btn-action" id="btn-navigasi">
                    <i class="fas fa-route"></i> Mulai Navigasi AR
                </button>
            </div>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
        
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // DATA MASTER TENANT KULINER (MAHAKAM LAMPION GARDEN SAMARINDA)
        // Koordinat disimulasikan di area MLG. Saat implementasi asli, sesuaikan koordinat presisi hasil mapping lapangan.
        const DATA_TENANT = [
            {
                id: 1,
                nama: "Coffee Shop Tepian",
                category: "Minuman & Kopi",
                menu: "Es Kopi Susu Gula Aren & Croissant",
                jam: "16:00 - 23:00 WITA",
                harga: "Rp 15.000 - Rp 35.000",
                lat: -0.505234, // Sesuaikan titik MLG asli
                lng: 117.153456
            },
            {
                id: 2,
                nama: "Soto Banjar Nyaman",
                category: "Makanan Berat",
                menu: "Soto Banjar Spesial Telur Bebek",
                jam: "15:00 - 22:00 WITA",
                harga: "Rp 25.000 - Rp 40.000",
                lat: -0.505450,
                lng: 117.153680
            },
            {
                id: 3,
                nama: "Pisang Gapuk Borneo",
                category: "Makanan Ringan",
                menu: "Pisang Gapuk Keju Susu",
                jam: "16:00 - 23:00 WITA",
                harga: "Rp 12.000 - Rp 20.000",
                lat: -0.505110,
                lng: 117.153210
            },
            {
                id: 4,
                nama: "Bakso Lubang Kelinci",
                category: "Makanan Berat",
                menu: "Bakso Beranak & Mie Ayam",
                jam: "15:00 - 22:30 WITA",
                harga: "Rp 18.000 - Rp 30.000",
                lat: -0.505600,
                lng: 117.153900
            }
        ];

        // State Management Aplikasi
        let userLocation = { lat: null, lng: null };
        let selectedTenant = null;
        let activeCategory = "semua";
        let deviceHeading = 0;

        // DOM Elements
        const splashScreen = document.getElementById('splash-screen');
        const alertBox = document.getElementById('geo-alert');
        const alertText = document.getElementById('alert-text');
        const drawer = document.getElementById('list-drawer');
        const detailCard = document.getElementById('detail-card');
        const compassGuide = document.getElementById('compass-guide');

        window.onload = () => {
            initGeolokan();
            initCompass();
            renderTenantList(DATA_TENANT);
            setupEventListeners();
            
            // Hilangkan Splash Screen jika A-Frame sudah merender kamera
            document.querySelector('a-scene').addEventListener('renderstart', () => {
                splashScreen.style.opacity = 0;
                setTimeout(() => splashScreen.style.display = 'none', 500);
            });
        };

        // KOMPUTASI GEOSPASIAL 1: Formula Haversine (Hitung Jarak Antara 2 Titik Koordinat)
        function hitungJarak(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Radius bumi dalam meter
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const deltaPhi = (lat2 - lat1) * Math.PI / 180;
            const deltaLambda = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                      Math.cos(phi1) * Math.cos(phi2) *
                      Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; // Hasil dalam Satuan Meter
        }

        // KOMPUTASI GEOSPASIAL 2: Hitung Bearing (Sudut Arah Menuju Target)
        function hitungBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180;
            const lat2Rad = lat2 * Math.PI / 180;

            const y = Math.sin(dLon) * Math.cos(lat2Rad);
            const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) -
                      Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            return (brng + 360) % 360; // Mengembalikan sudut derajat 0-360
        }

        // Inisialisasi High-Accuracy Geolocation API Browser
        function initGeolokan() {
            if (!navigator.geolocation) {
                tampilkanError("Browser Anda tidak mendukung deteksi lokasi (GPS).");
                return;
            }

            // WatchPosition memantau pergerakan user secara kontinu (Real-Time Tracking)
            navigator.geolocation.watchPosition(
                (position) => {
                    userLocation.lat = position.coords.latitude;
                    userLocation.lng = position.coords.longitude;
                    
                    updateDynamicData();
                    hideError();
                },
                (error) => {
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            tampilkanError("Izin GPS ditolak! Buka pengaturan browser untuk mengizinkan kamera & lokasi.");
                            break;
                        case error.POSITION_UNAVAILABLE:
                            tampilkanError("Sinyal GPS tidak akurat atau tidak ditemukan.");
                            break;
                        case error.TIMEOUT:
                            tampilkanError("Waktu tunggu permintaan lokasi habis.");
                            break;
                    }
                },
                // KODE BARU (Diperbarui untuk toleransi dalam ruangan)
                { enableHighAccuracy: false, maximumAge: 10000, timeout: 25000 }
                //{ enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
        }

        // Mengambil Data Sensor Kompas DeviceOrientation API (Khusus iOS/Android modern)
        function initCompass() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (event) => {
                    // Mendapatkan derajat hadap perangkat (Alpha/webkitCompassHeading)
                    deviceHeading = event.webkitCompassHeading || 360 - event.alpha;
                    updateCompassGuide();
                }, true);
            }
        }

        // Menyisipkan Objek AR secara Dinamis ke dalam A-Frame Scene graph
        function renderARObjects() {
            const scene = document.querySelector('a-scene');
            
            // Hapus objek lama sebelum re-render guna menghindari penumpukan node DOM
            document.querySelectorAll('.ar-tenant-node').forEach(el => el.remove());

            DATA_TENANT.forEach(tenant => {
                if (activeCategory !== "semua" && tenant.category !== activeCategory) return;

                // 1. Root Entity berbasis GPS koordinat
                const entity = document.createElement('a-entity');
                entity.setAttribute('class', 'ar-tenant-node');
                entity.setAttribute('gps-entity-place', `latitude: ${tenant.lat}; longitude: ${tenant.lng};`);
                
                // 2. Geometri Pointer 3D (Markerless Cone/Kerucut)
                const cone = document.createElement('a-cone');
                cone.setAttribute('radius-bottom', '0.6');
                cone.setAttribute('radius-top', '0');
                cone.setAttribute('height', '1.8');
                // Beri warna pembeda jika sedang di-navigasi aktif
                const isSelected = selectedTenant && selectedTenant.id === tenant.id;
                cone.setAttribute('material', `color: ${isSelected ? '#2ecc71' : '#ff7675'}; shading: flat; opacity: 0.9`);
                cone.setAttribute('position', '0 3 0'); // Melayang 3 Meter di atas tanah
                
                // Efek Animasi berputar dinamis pada objek AR
                cone.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear');
                entity.appendChild(cone);

                // 3. Papan Informasi Teks Terapung (Billboard Teks)
                const text = document.createElement('a-text');
                text.setAttribute('value', `${tenant.nama}`);
                text.setAttribute('align', 'center');
                text.setAttribute('scale', '5 5 5');
                text.setAttribute('position', '0 4.5 0');
                text.setAttribute('look-at', '[gps-camera]'); // Teks selalu menghadap ke user
                entity.appendChild(text);

                scene.appendChild(entity);
            });
        }

        // Render Antarmuka List Drawer 2D
        function renderTenantList(tenants) {
            const container = document.getElementById('tenant-list-container');
            container.innerHTML = '';

            tenants.forEach(tenant => {
                let jarakStr = "-- m";
                if(userLocation.lat && userLocation.lng) {
                    const jarak = hitungJarak(userLocation.lat, userLocation.lng, tenant.lat, tenant.lng);
                    jarakStr = `${Math.round(jarak)} m`;
                }

                const item = document.createElement('div');
                item.className = 'list-item';
                item.onclick = () => pilihTenant(tenant);
                item.innerHTML = `
                    <div class="list-info">
                        <h4>${tenant.nama}</h4>
                        <p><i class="fas fa-tag"></i> ${tenant.category} | <i class="fas fa-map-marker-alt"></i> ${jarakStr}</p>
                    </div>
                    <div class="list-action">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Logic Saat User Memilih Salah Satu Tenant
        function pilihTenant(tenant) {
            selectedTenant = tenant;
            drawer.classList.remove('open');
            
            // Tampilkan Detail Card di bagian bawah layar
            document.getElementById('card-nama').innerText = tenant.nama;
            document.getElementById('card-menu').innerText = tenant.menu;
            document.getElementById('card-jam').innerText = tenant.jam;
            document.getElementById('card-harga').innerText = tenant.harga;
            
            detailCard.style.display = 'block';
            compassGuide.style.display = 'flex';

            // Refresh AR View agar warna objek terpilih berubah jadi hijau (navigasi aktif)
            renderARObjects();
            updateDynamicData();
        }

        // Update Jarak dan Kompas secara Real-time Berdasarkan Pergerakan User
        function updateDynamicData() {
            // Update Jarak pada Detail Card jika terbuka
            if (selectedTenant && userLocation.lat) {
                const jarak = hitungJarak(userLocation.lat, userLocation.lng, selectedTenant.lat, selectedTenant.lng);
                document.getElementById('card-jarak').innerText = `${Math.round(jarak)} m`;
            }

            // Jalankan render objek AR pertama kali setelah posisi GPS didapatkan
            if(document.querySelectorAll('.ar-tenant-node').length === 0) {
                renderARObjects();
            }
            
            // Update info jarak di list drawer 2D
            const filtered = filterData();
            renderTenantList(filtered);
        }

        // Memutar Jarum Kompas UI (HUD) untuk Mengarahkan Hadap User ke Objek
        function updateCompassGuide() {
            if (!selectedTenant || !userLocation.lat) return;

            const bearing = hitungBearing(userLocation.lat, userLocation.lng, selectedTenant.lat, selectedTenant.lng);
            // Defleksi sudut arah panah = Sudut Bearing Target dikurangi Sudut Hadap HP saat ini
            const arahPanah = bearing - deviceHeading;

            compassGuide.style.transform = `rotate(${arahPanah}deg)`;
        }

        // Logika Penyaringan (Searching dan Filtering Kategori)
        function filterData() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            return DATA_TENANT.filter(tenant => {
                const matchKeyword = tenant.nama.toLowerCase().includes(keyword) || tenant.menu.toLowerCase().includes(keyword);
                const matchCategory = activeCategory === "semua" || tenant.category === activeCategory;
                return matchKeyword && matchCategory;
            });
        }

        // Event Listener Registration
        function setupEventListeners() {
            // Search Input Event
            document.getElementById('search-input').addEventListener('input', () => {
                const hasilFilter = filterData();
                renderTenantList(hasilFilter);
            });

            // Category Filter Click Event
            document.querySelectorAll('.tag').forEach(tag => {
                tag.addEventListener('click', (e) => {
                    document.querySelector('.tag.active').classList.remove('active');
                    e.target.classList.add('active');
                    activeCategory = e.target.getAttribute('data-category');
                    
                    renderARObjects();
                    renderTenantList(filterData());
                });
            });

            // Toggle Drawer List View
            document.getElementById('btn-toggle-list').addEventListener('click', () => {
                drawer.classList.add('open');
            });
            document.getElementById('btn-close-drawer').addEventListener('click', () => {
                drawer.classList.remove('open');
            });

            // Button Mulai Navigasi AR pada Card
            const btnNav = document.getElementById('btn-navigasi');
            btnNav.addEventListener('click', () => {
                if(btnNav.classList.contains('navigating')) {
                    // Batalkan Navigasi
                    btnNav.classList.remove('navigating');
                    btnNav.innerHTML = `<i class="fas fa-route"></i> Mulai Navigasi AR`;
                    compassGuide.style.display = 'none';
                    selectedTenant = null;
                    renderARObjects();
                } else {
                    // Aktifkan Navigasi
                    btnNav.classList.add('navigating');
                    btnNav.innerHTML = `<i class="fas fa-stop-circle"></i> Selesai / Berhenti`;
                }
            });
        }

        // Helper UI Error Box
        function tampilkanError(pesan) {
            alertText.innerText = pesan;
            alertBox.style.display = 'block';
        }
        function hideError() {
            alertBox.style.display = 'none';
        }
    </script>
</body>
</html>
